replicaCount: 1

image:
  repository: gentlemanprogramming/postgram
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 7437

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: postgram.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

database:
  url: ""
  existingSecret: ""
  urlSecretKey: POSTGRAM_DATABASE_URL
  createSecret: false

mcp:
  httpPath: /mcp
  tools: agent
  baseUrl: ""
  auth:
    enabled: false
    oidcIssuer: ""
    oidcAudience: ""
    jwksUrl: ""
    requiredScope: ""
    resourceMetadataPath: /.well-known/oauth-protected-resource
    resource: ""
    authorizationServers: ""

persistence:
  enabled: true
  size: 10Gi
  storageClass: ""
  accessModes:
    - ReadWriteOnce

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

podAnnotations: {}
