name: Helm Chart Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish Helm Chart to GHCR
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      CHART_PATH: charts/postgram
      REGISTRY: ghcr.io
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Resolve OCI repository
        id: repo
        shell: bash
        run: |
          set -euo pipefail
          owner='${{ github.repository_owner }}'
          owner="${owner,,}"
          echo "repository=oci://ghcr.io/$owner/charts" >> "$GITHUB_OUTPUT"
          echo "Using OCI chart repository: oci://ghcr.io/$owner/charts"

      - name: Validate chart version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail
          chart_version="$(helm show chart "$CHART_PATH" | awk '/^version:/ { print $2 }')"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$chart_version" != "$tag_version" ]; then
            echo "Chart version $chart_version does not match tag $tag_version"
            exit 1
          fi

      - name: Lint chart
        run: helm lint "$CHART_PATH"

      - name: Log in to GHCR
        shell: bash
        run: |
          set -euo pipefail
          echo '${{ github.token }}' | helm registry login "$REGISTRY" --username '${{ github.actor }}' --password-stdin

      - name: Package chart
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .chart-packages
          helm package "$CHART_PATH" --destination .chart-packages

      - name: Push chart to GHCR
        shell: bash
        run: |
          set -euo pipefail
          helm push .chart-packages/postgram-*.tgz '${{ steps.repo.outputs.repository }}'
