name: Docker Publish

on:
  push:
    tags:
      - "v*"
  create:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Build and Publish Docker Image
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'create' && github.event.ref_type == 'tag' && startsWith(github.event.ref, 'v'))
    runs-on: ubuntu-latest
    env:
      DEFAULT_IMAGE_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/postgram
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image repository
        id: image
        shell: bash
        run: |
          set -euo pipefail
          repo='${{ vars.DOCKERHUB_REPOSITORY }}'
          if [ -z "$repo" ]; then
            repo="$DEFAULT_IMAGE_REPO"
          fi
          repo="${repo,,}"
          echo "repository=$repo" >> "$GITHUB_OUTPUT"
          echo "Using Docker image repository: $repo"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
